      line-height: 1.6; margin-bottom: 14px; font-size: 0.95rem;
    }

// ══════════════════════════════════════════════════
// 📤 GỬI GOOGLE SHEETS — đã fix CORS + 302 redirect
// ══════════════════════════════════════════════════
function setSheetStatus(type, msg) {
  const el = document.getElementById('sheet-status');
  if (!el) return;
  el.className = type;
  el.textContent = msg;
}

function saveToLocalStorage(data) {
  try {
    const list = JSON.parse(localStorage.getItem('survey_backup') || '[]');
    list.push({ data, savedAt: new Date().toISOString() });
    localStorage.setItem('survey_backup', JSON.stringify(list));
    console.log('💾 Đã backup vào localStorage.');
  } catch(e) { console.error('localStorage error:', e); }
}

async function sendToGoogleSheets(output) {
  const isValid = APPS_SCRIPT_URL &&
    APPS_SCRIPT_URL !== 'https://script.google.com/macros/s/AKfycbwvt6R9tSch-SMYMU447F9XFt-BpuDXk9VbyxCBNoQwoEpCcIgQpXtHBJFij9jz1D1DhA/exec' &&
    APPS_SCRIPT_URL.startsWith('https://script.google.com');

  if (!isValid) {
    setSheetStatus('saved', '⚠️ Chưa cấu hình URL. Dữ liệu lưu cục bộ.');
    saveToLocalStorage(output);
    return;
  }

  setSheetStatus('sending', '⏳ Đang gửi lên Google Sheets...');

  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), 15000);

  try {
    // FIX CHÍNH:
    // 1. redirect: 'follow'  — tường minh follow 302 redirect của Apps Script
    // 2. Content-Type: text/plain — tránh CORS preflight
    // 3. Không dùng mode: 'no-cors' — để đọc được response
    const res = await fetch(APPS_SCRIPT_URL, {
      method:   'POST',
      redirect: 'follow',
      headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
      body:     JSON.stringify(output),
      signal:   controller.signal
    });
    clearTimeout(tid);

    // HtmlService trả text/html — đọc text rồi extract JSON từ body
    const raw = await res.text();

    // Apps Script bọc JSON trong HTML, cần extract
    let result;
    try {
      // Thử parse trực tiếp trước (nếu server trả JSON thuần)
      result = JSON.parse(raw);
    } catch (_) {
      // Extract JSON từ trong HTML tag
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        result = JSON.parse(match[0]);
      } else {
        throw new Error('Không tìm thấy JSON trong response: ' + raw.substring(0, 100));
      }
    }

    if (result.status === 'success') {
      setSheetStatus('success', '✅ Ghi Google Sheets thành công! ' + (result.message || ''));
      console.log('✅', result.message);
    } else {
      throw new Error(result.message || 'Server báo lỗi');
    }

  } catch (err) {
    clearTimeout(tid);
    const msg = err.name === 'AbortError' ? 'Timeout 15 giây.' : err.message;
    console.error('❌ Lỗi gửi:', msg);
    setSheetStatus('error', '❌ Gửi thất bại: ' + msg + ' — Dữ liệu đã lưu cục bộ.');
    saveToLocalStorage(output);
  }
}

// 🎮 PHASER — StartScene
// ══════════════════════════════════════════════════
class StartScene extends Phaser.Scene {
  constructor() { super('StartScene'); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    const bg = this.add.graphics();
    bg.fillGradientStyle(0x0f172a, 0x0f172a, 0x1e3a8a, 0x0f766e, 1);
    bg.fillRect(0, 0, W, H);
    for (let i = 0; i < 20; i++) {
      this.add.circle(Phaser.Math.Between(0,W), Phaser.Math.Between(0,H),
        Phaser.Math.FloatBetween(1,2.6), 0xffffff, Phaser.Math.FloatBetween(0.15,0.55));
    }
    this.add.text(W/2, H*0.18, '🌿', { fontFamily:'Nunito,Arial,sans-serif', fontSize:'56px' }).setOrigin(0.5);
    this.add.text(W/2, H*0.30, 'Khảo sát thương hiệu X', {
      fontFamily:'Nunito,Arial,sans-serif', fontSize:'26px', fontStyle:'800',
      color:'#fde047', align:'center', wordWrap:{width:W-40,useAdvancedWrap:true}
    }).setOrigin(0.5);
    this.add.text(W/2, H*0.44, 'Chạm trực tiếp vào đáp án để nhân vật nhảy tới và chọn.', {
      fontFamily:'Nunito,Arial,sans-serif', fontSize:'16px', color:'#e2e8f0',
      align:'center', wordWrap:{width:W-50,useAdvancedWrap:true}, lineSpacing:4
    }).setOrigin(0.5);
    const btn = this.add.text(W/2, H*0.72, ' BẮT ĐẦU ', {
      fontFamily:'Nunito,Arial,sans-serif', fontSize:'24px', fontStyle:'800',
      color:'#111827', backgroundColor:'#fde047', padding:{x:24,y:14}
    }).setOrigin(0.5).setInteractive({useHandCursor:true});
    this.tweens.add({targets:btn, scaleX:1.05, scaleY:1.05, duration:720, yoyo:true, repeat:-1});
    btn.on('pointerdown', () => this.scene.start('GameScene'));
  }
}

    this.W       = this.scale.width;
    this.H       = this.scale.height;
    this.groundY = this.H - CFG.GROUND_H - CFG.CHAR_H / 2;

    const bg = this.add.graphics();
    bg.fillGradientStyle(0x081120, 0x0f172a, 0x10233f, 0x164e63, 1);
    bg.fillRect(0, 0, this.W, this.H);
    for (let i = 0; i < 28; i++) {
      this.add.circle(Phaser.Math.Between(0,this.W), Phaser.Math.Between(0,this.H),
        Phaser.Math.FloatBetween(0.8,2.0), 0xffffff, Phaser.Math.FloatBetween(0.12,0.5));
    }

    this.groundGfx   = this.add.graphics();
    this.pfContainer = this.add.container(0, 0);
    this.charGfx     = this.add.graphics();
    this.charX = this.W / 2;
    this.charY = this.groundY;
    this.facingRight = true;

    this.createHUD();
    this.createQuestionBubble();
    this.createFeedbackText();
    this.spawnPlatforms(this.currentQ);
    this.updateQuestionUI();
  }

  createHUD() {
    const hud = this.add.graphics();
    hud.fillStyle(0x000000, 0.32);
    hud.fillRect(0, 0, this.W, 56);
    const track = this.add.graphics();
    track.fillStyle(0xffffff, 0.12);
    track.fillRoundedRect(12, 36, this.W - 24, 10, 6);
    this.progressFill = this.add.graphics();
    this.hudLabel = this.add.text(this.W/2, 16, '', {
      fontFamily:'Nunito,Arial,sans-serif', fontSize:'14px', fontStyle:'800', color:'#fde68a'
    }).setOrigin(0.5);
  }

  createQuestionBubble() {
    const bubbleY = 60, bubbleH = 136;
    this.bubbleBg = this.add.graphics();
    this.bubbleBg.fillStyle(0xffffff, 0.97);
    this.bubbleBg.fillRoundedRect(10, bubbleY, this.W-20, bubbleH, 18);
    this.bubbleBg.fillTriangle(
      this.W/2-10, bubbleY+bubbleH, this.W/2+10, bubbleY+bubbleH, this.W/2, bubbleY+bubbleH+14
    );
    this.questionText = this.add.text(this.W/2, bubbleY+26, '', {
      fontFamily:'Nunito,Arial,sans-serif', fontSize:'16px', fontStyle:'800',
      color:'#0f172a', align:'center', wordWrap:{width:this.W-50,useAdvancedWrap:true}, lineSpacing:5
    }).setOrigin(0.5, 0);
    this.helperText = this.add.text(this.W/2, bubbleY+100, '', {
      fontFamily:'Nunito,Arial,sans-serif', fontSize:'12px', fontStyle:'700',
      color:'#1e293b', backgroundColor:'#dbeafe', padding:{x:8,y:4},
      align:'center', wordWrap:{width:this.W-70,useAdvancedWrap:true}
    }).setOrigin(0.5).setVisible(false);
  }

  createFeedbackText() {
    this.feedbackText = this.add.text(this.W/2, this.H*0.60, 'Cảm ơn!', {
      fontFamily:'Nunito,Arial,sans-serif', fontSize:'26px', fontStyle:'800',
      color:'#fef08a', backgroundColor:'rgba(15,23,42,0.75)', padding:{x:12,y:8}, align:'center'
    }).setOrigin(0.5).setAlpha(0);
  }

  updateQuestionUI() {
    const total = SURVEY_DATA.questions.length;
    const q     = SURVEY_DATA.questions[this.currentQ];
    const pct   = this.currentQ / total;
    this.hudLabel.setText(`Câu ${this.currentQ + 1}/${total}`);
    this.progressFill.clear();
    this.progressFill.fillStyle(0x22c55e, 1);
    this.progressFill.fillRoundedRect(12, 36, (this.W-24)*pct, 10, 6);
    this.questionText.setText(q.text);
    if (q.type === 'likert') {
      this.helperText.setText('Thang đo Likert: 1 = Hoàn toàn không đồng ý, 5 = Hoàn toàn đồng ý');
      this.helperText.setVisible(true);
    } else {
      this.helperText.setVisible(false);
    }
  }

  shortenLabel(label) {
    const map = {
      'Dưới 18 tuổi':'Dưới 18','Từ 18 - 25':'18 - 25','Từ 26 - 35':'26 - 35',
      'Trên 35 tuổi':'Trên 35','Dưới 5 triệu':'Dưới 5tr','5 - 10 triệu':'5 - 10tr',
      '11 - 20 triệu':'11 - 20tr','Trên 20 triệu':'Trên 20tr',
      'Tỉnh thành khác':'Tỉnh khác','500k - 1 triệu':'500k-1tr','4 - 6: Trung bình':'4-6: TB'
    };
    return map[label] || label;
  }

  spawnPlatforms(qIndex) {
    this.platformViews.forEach(p => { p.zone.destroy(); p.container.destroy(); });
    this.platformViews = [];
    this.platforms     = [];
    const q      = SURVEY_DATA.questions[qIndex];
    const opts   = q.options;
    const n      = opts.length;
    const usable = this.W - 40;
    const step   = usable / n;
    const startX = 20 + step / 2;
    const baseY  = this.groundY - CFG.PLATFORM_ABOVE_GROUND;

    opts.forEach((opt, i) => {
      const x = startX + i * step;
      const y = q.type === 'likert' ? baseY-(n-1-i)*18 : baseY+(i%2===0?0:-16);
      const cont = this.add.container(x, y);
      const g = this.add.graphics();
      g.fillStyle(opt.color, 1);
      g.fillRoundedRect(-CFG.PLATFORM_W/2, -CFG.PLATFORM_H/2, CFG.PLATFORM_W, CFG.PLATFORM_H, 9);
      g.fillStyle(0xffffff, 0.18);
      g.fillRoundedRect(-CFG.PLATFORM_W/2+4, -CFG.PLATFORM_H/2+3, CFG.PLATFORM_W-8, 4, 3);
      const labelBg = this.add.graphics();
      labelBg.fillStyle(0x0f172a, 0.82);
      labelBg.fillRoundedRect(-54, -62, 108, q.type==='likert'?40:30, 8);
      const display = q.type==='likert' ? opt.label : this.shortenLabel(opt.label);
      const label = this.add.text(0, q.type==='likert'?-48:-46, display, {
        fontFamily:'Nunito,Arial,sans-serif',
        fontSize: q.type==='likert'?'16px':(display.length>12?'10px':'12px'),
        fontStyle:'800', color:'#ffffff', align:'center',
        wordWrap:{width:100,useAdvancedWrap:true}, lineSpacing:2
      }).setOrigin(0.5);
      cont.add([g, labelBg, label]);
      if (q.type === 'likert') {
        const desc = this.add.text(0, -28, opt.desc, {
          fontFamily:'Nunito,Arial,sans-serif', fontSize:'8px',
          fontStyle:'700', color:'#cbd5e1', align:'center',
          wordWrap:{width:100,useAdvancedWrap:true}
        }).setOrigin(0.5);
        cont.add(desc);
      }
      const zone = this.add.zone(x-60, y-72, 120, 96).setOrigin(0,0).setInteractive({useHandCursor:true});
      zone.on('pointerdown', () => this.handleAnswerTap(opt, x, y, i));
      this.tweens.add({ targets:cont, y:y-5, duration:980+i*70, yoyo:true, repeat:-1, ease:'Sine.easeInOut' });
      this.pfContainer.add(cont);
      this.platforms.push({x, y, option:opt, index:i});
      this.platformViews.push({container:cont, zone});
    });
  }

  handleAnswerTap(option, x, y, idx) {
    if (this.transitioning) return;
    this.transitioning = true;
    this.facingRight   = x >= this.charX;
    const landingY = y - CFG.PLATFORM_H/2 - CFG.CHAR_H/2;
    const peakY    = landingY - 40;
    const startX   = this.charX, startY = this.charY;
    const midX     = (startX + x) / 2;
    const sv = this.platformViews[idx];
    if (sv) this.tweens.add({ targets:sv.container, scaleX:1.16, scaleY:1.16, duration:120, yoyo:true });
    this.tweens.addCounter({
      from:0, to:1, duration:520, ease:'Sine.easeInOut',
      onUpdate: tween => {
        const t = tween.getValue();
        this.charX = Phaser.Math.Interpolation.Linear([startX, midX, x], t);
        this.charY = Phaser.Math.Interpolation.QuadraticBezier(t, startY, peakY, landingY);
      },
      onComplete: () => {
        this.charX = x; this.charY = landingY;
        this.saveAnswer(option);
        this.burst(this.charX, this.charY, option.color);
        this.showThankYouThenNext(option);
      }
    });
  }

  showThankYouThenNext(option) {
    this.feedbackText.setText('Cảm ơn!').setAlpha(1).setScale(0.8);
    this.tweens.add({ targets:this.feedbackText, alpha:1, scaleX:1, scaleY:1, duration:180, ease:'Back.Out' });
    const q = SURVEY_DATA.questions[this.currentQ];
    const endedEarly = q.id === 'Q05' && option.value === 'chua_dung';
    this.time.delayedCall(650, () => {
      this.tweens.add({ targets:this.feedbackText, alpha:0, duration:180 });
      if (endedEarly) { this.endGame(true); return; }
      this.currentQ++;
      if (this.currentQ >= SURVEY_DATA.questions.length) { this.endGame(false); return; }
      this.charX = this.W/2; this.charY = this.groundY;
      this.transitioning = false;
      this.spawnPlatforms(this.currentQ);
      this.updateQuestionUI();
    });
  }

  saveAnswer(option) {
    const q = SURVEY_DATA.questions[this.currentQ];
    surveyResponses.push({
      questionId:   q.id,
      questionText: q.text,
      answerId:     option.value,
      answerLabel:  option.label,
      timestamp:    new Date().toISOString()
    });
  }

  endGame(skipped = false) {
    // Snapshot ngay lập tức
    const snapshotResponses = [...surveyResponses];
    const output = {
      survey:            SURVEY_DATA.title,
      completedAt:       new Date().toISOString(),
      endedEarly:        skipped,
      totalQuestions:    SURVEY_DATA.questions.length,
      answeredQuestions: snapshotResponses.length,
      responses:         snapshotResponses
    };
    finalOutput = output;

    // Hiển thị UI ngay
    const resultEl = document.getElementById('survey-result');
    const jsonEl   = document.getElementById('result-json');
    if (jsonEl)   jsonEl.textContent     = JSON.stringify(output, null, 2);
    if (resultEl) resultEl.style.display = 'block';

    // Gửi Sheets bất đồng bộ (không await, không block UI)
    sendToGoogleSheets(output);

    // Pause scene
    if (this.scene && this.scene.pause) this.scene.pause();
  }

  drawCharacter() {
    const g = this.charGfx, x = this.charX, y = this.charY, f = this.facingRight?1:-1;
    g.clear();
    g.fillStyle(0x000000,0.18); g.fillEllipse(x, y+CFG.CHAR_H/2+3, CFG.CHAR_W+8, 8);
    g.fillStyle(0x2563eb); g.fillRoundedRect(x-CFG.CHAR_W/2, y-CFG.CHAR_H/2+12, CFG.CHAR_W, CFG.CHAR_H-12, 6);
    g.fillStyle(0xf1c27d); g.fillCircle(x, y-CFG.CHAR_H/2+8, 13);
    g.fillStyle(0xffffff); g.fillCircle(x+f*4, y-CFG.CHAR_H/2+7, 4);
    g.fillStyle(0x111827); g.fillCircle(x+f*5.4, y-CFG.CHAR_H/2+7, 2);
    g.fillStyle(0x22c55e);
    g.fillRoundedRect(x-14*f, y-CFG.CHAR_H/2-4, 24*f, 8, 4);
    g.fillRect(x-17*f, y-CFG.CHAR_H/2+4, 28*f, 4);
    g.fillStyle(0x1e3a8a);
    g.fillRoundedRect(x-10, y+CFG.CHAR_H/2-12, 8, 12, 3);
    g.fillRoundedRect(x+2,  y+CFG.CHAR_H/2-12, 8, 12, 3);
  }

  drawGround() {
    this.groundGfx.clear();
    this.groundGfx.fillStyle(0x15803d,1);
    this.groundGfx.fillRect(0, this.H-CFG.GROUND_H, this.W, CFG.GROUND_H);
    this.groundGfx.fillStyle(0x4ade80,1);
    this.groundGfx.fillRect(0, this.H-CFG.GROUND_H, this.W, 7);
  }

  burst(x, y, color=0xffffff) {
    for (let i=0; i<10; i++) {
      const dot = this.add.circle(x, y, Phaser.Math.Between(2,4), color, 0.95);
      const a = Phaser.Math.FloatBetween(0, Math.PI*2);
      const s = Phaser.Math.FloatBetween(70, 200);
      this.particles.push({ obj:dot, x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-80, life:0.55, maxLife:0.55 });
    }
  }

  update(time, delta) {
    const dt = delta/1000;
    for (let i=this.particles.length-1; i>=0; i--) {
      const p = this.particles[i];
      p.life -= dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 220*dt;
      p.obj.setPosition(p.x, p.y).setAlpha(Math.max(0, p.life/p.maxLife));
      if (p.life<=0) { p.obj.destroy(); this.particles.splice(i,1); }
    }
    this.drawCharacter();
    this.drawGround();
  }
}

// ══════════════════════════════════════════════════
// 💾 DOWNLOAD & UTILITIES
// ══════════════════════════════════════════════════
function buildCSV(output) {
  const rows = [['survey','completedAt','endedEarly','totalQuestions','answeredQuestions','questionId','questionText','answerId','answerLabel','timestamp']];
  output.responses.forEach(r => {
    rows.push([output.survey,output.completedAt,output.endedEarly,output.totalQuestions,
      output.answeredQuestions,r.questionId,r.questionText,r.answerId,r.answerLabel,r.timestamp]);
  });
  return rows.map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
}

function downloadTextFile(filename, text, mimeType) {
  const blob = new Blob(['\uFEFF'+text], {type:mimeType});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function downloadJSON() {
  if (!finalOutput) return;
  downloadTextFile(`survey_${new Date().toISOString().replace(/[:.]/g,'-')}.json`, JSON.stringify(finalOutput,null,2), 'application/json;charset=utf-8');
}

function downloadCSV() {
  if (!finalOutput) return;
  downloadTextFile(`survey_${new Date().toISOString().replace(/[:.]/g,'-')}.csv`, buildCSV(finalOutput), 'text/csv;charset=utf-8');
}

function copyResult() {
  const text = document.getElementById('result-json').textContent;
  navigator.clipboard.writeText(text)
    .then(() => alert('Đã sao chép dữ liệu.'))
    .catch(() => alert('Không thể sao chép tự động. Hãy sao chép thủ công.'));
}

function restartGame() {
  document.getElementById('survey-result').style.display = 'none';
  surveyResponses = []; finalOutput = null;
  if (game) { game.scene.stop('GameScene'); game.scene.start('StartScene'); }
}

game = new Phaser.Game({

  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH }
});

document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
