<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      font-family: 'Nunito', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container canvas {
      display: block;
      border-radius: 0;
    }

    #survey-result {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0f172a 0%, #172554 100%);
      color: #eef2ff;
      z-index: 99;
      overflow-y: auto;
      padding: 18px;
    }

    #survey-result .result-card {
      width: min(920px, 100%);
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    #survey-result h2 {
      font-size: 1.6rem;
      line-height: 1.2;
      text-align: center;
      color: #fde047;
      margin-bottom: 8px;
      font-weight: 800;
    }

    #survey-result .sub {
      text-align: center;
      color: #cbd5e1;
      font-size: 0.98rem;
      margin-bottom: 16px;
    }

    #survey-result .status-box {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 0.92rem;
      font-weight: 700;
    }
    #survey-result .status-success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.4);
      color: #34d399;
    }
    #survey-result .status-warning {
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid rgba(245, 158, 11, 0.4);
      color: #fbbf24;
    }

    #survey-result pre {
      background: rgba(2, 6, 23, 0.75);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px;
      font-size: 0.84rem;
      line-height: 1.65;
      color: #bbf7d0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-height: 260px;
      overflow-y: auto;
    }

    #survey-result .result-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    #survey-result button {
      border: 0;
      background: #fde047;
      color: #111827;
      border-radius: 999px;
      padding: 12px 20px;
      font-family: 'Nunito', Arial, sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      min-height: 44px;
    }

    #survey-result button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="survey-result">
    <div class="result-card">
      <h2>Cảm ơn bạn đã tham gia</h2>
      <p class="sub">Khảo sát đã hoàn tất. Dữ liệu đã được tổng hợp để tải xuống máy.</p>
      
      <div id="status-message" class="status-box status-success">
        Dữ liệu phản hồi đã được tạo thành file. Bạn có thể tải xuống dưới dạng JSON hoặc CSV.
      </div>
      
      <pre id="result-json"></pre>
      
      <div class="result-actions">
        <button type="button" onclick="downloadJSON()">Tải file JSON</button>
        <button type="button" onclick="downloadCSV()">Tải file CSV</button>
        <button type="button" class="secondary" onclick="copyResult()">Sao chép dữ liệu</button>
        <button type="button" class="secondary" onclick="restartGame()">Làm lại</button>

  MOVE_SPEED: 235,
  AIR_DRAG: 0.9,
  GROUND_DRAG: 0.78,
  PLATFORM_W: 112,
  PLATFORM_H: 20,
  CHAR_W: 28,
  CHAR_H: 38,
  GROUND_H: 52,
  CONTROL_SIZE: 64,
  SAFE_TOP: 178
};

class StartScene extends Phaser.Scene {
  constructor() { super('StartScene'); }
  create() {
    const W = this.scale.width;
    const H = this.scale.height;
    const bg = this.add.graphics();
    bg.fillGradientStyle(0x0f172a, 0x0f172a, 0x1e3a8a, 0x0f766e, 1);
    bg.fillRect(0, 0, W, H);
    this.dots = [];
    for (let i = 0; i < 14; i++) {
      const t = this.add.circle(Phaser.Math.Between(10, W - 10), Phaser.Math.Between(10, H - 10), Phaser.Math.Between(2, 4), 0x86efac, Phaser.Math.FloatBetween(0.2, 0.8));
      t.vy = Phaser.Math.FloatBetween(0.12, 0.45);
      this.dots.push(t);
    }
    this.add.text(W / 2, H * 0.16, '🌿', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '54px' }).setOrigin(0.5);
    this.add.text(W / 2, H * 0.28, 'Khảo sát thương hiệu X', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '26px', fontStyle: '800', color: '#fde047', align: 'center', wordWrap: { width: W - 40, useAdvancedWrap: true } }).setOrigin(0.5);
    this.add.text(W / 2, H * 0.41, 'Di chuyển nhân vật đến bậc đáp án và nhấn nút nhảy để chọn.', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '16px', color: '#e2e8f0', align: 'center', wordWrap: { width: W - 46, useAdvancedWrap: true }, lineSpacing: 4 }).setOrigin(0.5);
    this.add.text(W / 2, H * 0.52, `${SURVEY_DATA.questions.length} câu hỏi • Tối ưu cho điện thoại`, { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '14px', color: '#cbd5e1', align: 'center' }).setOrigin(0.5);
    const btn = this.add.text(W / 2, H * 0.72, ' BẮT ĐẦU ', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '24px', fontStyle: '800', color: '#111827', backgroundColor: '#fde047', padding: { x: 22, y: 14 } }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    this.tweens.add({ targets: btn, scaleX: 1.05, scaleY: 1.05, duration: 750, yoyo: true, repeat: -1 });
    btn.on('pointerdown', () => this.scene.start('GameScene'));
    this.add.text(W / 2, H * 0.88, 'Nút trái/phải để di chuyển • Nút JUMP để chọn đáp án', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '12px', color: '#cbd5e1', align: 'center', wordWrap: { width: W - 36, useAdvancedWrap: true } }).setOrigin(0.5);
  }
  update() {
    const H = this.scale.height;
    this.dots.forEach(dot => { dot.y += dot.vy; if (dot.y > H + 10) dot.y = -10; });
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }
  init() {
    surveyResponses = []; this.currentQ = 0; this.transitioning = false; this.answerLocked = false;
    this.platforms = []; this.platformViews = []; this.particles = [];
    this.leftDown = false; this.rightDown = false; this.jumpQueued = false; this.canJump = true;
  }
  create() {
    this.W = this.scale.width; this.H = this.scale.height; this.groundY = this.H - CFG.GROUND_H - CFG.CHAR_H / 2;
    const bg = this.add.graphics(); bg.fillGradientStyle(0x081120, 0x0f172a, 0x10233f, 0x164e63, 1); bg.fillRect(0, 0, this.W, this.H);
    for (let i = 0; i < 32; i++) { this.add.circle(Phaser.Math.Between(0, this.W), Phaser.Math.Between(0, this.H), Phaser.Math.FloatBetween(0.8, 2.2), 0xffffff, Phaser.Math.FloatBetween(0.15, 0.55)); }
    this.groundGfx = this.add.graphics(); this.pfContainer = this.add.container(0, 0); this.charGfx = this.add.graphics();
    this.charX = this.W / 2; this.charY = this.groundY; this.charVX = 0; this.charVY = 0; this.facingRight = true;
    this.createHUD(); this.createQuestionBubble(); this.createControls(); this.createKeyboard();
    this.spawnPlatforms(this.currentQ); this.updateQuestionUI();
  }
  createHUD() {
    const hud = this.add.graphics(); hud.fillStyle(0x000000, 0.28); hud.fillRect(0, 0, this.W, 54);
    const track = this.add.graphics(); track.fillStyle(0xffffff, 0.14); track.fillRoundedRect(12, 34, this.W - 24, 10, 6);
    this.progressFill = this.add.graphics();
    this.hudLabel = this.add.text(this.W / 2, 14, '', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '14px', fontStyle: '800', color: '#fde68a' }).setOrigin(0.5);
  }
  createQuestionBubble() {
    const bubbleY = 58; const bubbleH = 132;
    this.bubbleBg = this.add.graphics(); this.bubbleBg.fillStyle(0xffffff, 0.97); this.bubbleBg.fillRoundedRect(10, bubbleY, this.W - 20, bubbleH, 18);
    this.bubbleBg.fillTriangle(this.W / 2 - 10, bubbleY + bubbleH, this.W / 2 + 10, bubbleY + bubbleH, this.W / 2, bubbleY + bubbleH + 14);
    this.questionText = this.add.text(this.W / 2, bubbleY + 34, '', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '16px', fontStyle: '800', color: '#0f172a', align: 'center', wordWrap: { width: this.W - 48, useAdvancedWrap: true }, lineSpacing: 5 }).setOrigin(0.5, 0);
    this.helperText = this.add.text(this.W / 2, bubbleY + 92, '', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '12px', fontStyle: '700', color: '#334155', backgroundColor: '#ecfeff', padding: { x: 8, y: 4 }, align: 'center', wordWrap: { width: this.W - 70, useAdvancedWrap: true } }).setOrigin(0.5).setVisible(false);
  }
  createKeyboard() {
    this.cursors = this.input.keyboard.createCursorKeys();
    this.keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this.keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
    this.keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
    this.keyUp = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);
  }
  createControls() {
    this.controlsContainer = this.add.container(0, 0);
    const makeCircleButton = (x, y, label, fill, onDown, onUp) => {
      const wrap = this.add.container(x, y);
      const bg = this.add.circle(0, 0, CFG.CONTROL_SIZE / 2, fill, 0.95).setStrokeStyle(2, 0xffffff, 0.18);
      const text = this.add.text(0, 0, label, { fontFamily: 'Nunito, Arial, sans-serif', fontSize: label === 'JUMP' ? '18px' : '28px', fontStyle: '800', color: '#ffffff' }).setOrigin(0.5);
      wrap.add([bg, text]);
      const zone = this.add.zone(x - CFG.CONTROL_SIZE / 2, y - CFG.CONTROL_SIZE / 2, CFG.CONTROL_SIZE, CFG.CONTROL_SIZE).setOrigin(0, 0).setInteractive({ useHandCursor: true });
      const press = () => { wrap.setScale(0.94); onDown && onDown(); };
      const release = () => { wrap.setScale(1); onUp && onUp(); };
      zone.on('pointerdown', press); zone.on('pointerup', release); zone.on('pointerout', release); zone.on('pointerupoutside', release);
      this.controlsContainer.add([wrap, zone]);
      return { wrap, zone };
    };
    const y = this.H - 72;
    this.btnLeft = makeCircleButton(58, y, '◀', 0x1d4ed8, () => this.leftDown = true, () => this.leftDown = false);
    this.btnRight = makeCircleButton(132, y, '▶', 0x1d4ed8, () => this.rightDown = true, () => this.rightDown = false);
    this.btnJump = makeCircleButton(this.W - 82, y - 4, 'JUMP', 0x16a34a, () => this.jumpQueued = true, null);
    const note = this.add.text(this.W / 2, this.H - 22, 'Chạm nút JUMP khi đứng dưới đáp án muốn chọn', { fontFamily: 'Nunito, Arial, sans-serif', fontSize: '11px', fontStyle: '700', color: '#cbd5e1', align: 'center', wordWrap: { width: this.W - 120, useAdvancedWrap: true } }).setOrigin(0.5);
    this.controlsContainer.add(note);
  }
  updateQuestionUI() {
    const total = SURVEY_DATA.questions.length; const q = SURVEY_DATA.questions[this.currentQ];
    this.hudLabel.setText(`Câu ${this.currentQ + 1}/${total}`);
    const pct = this.currentQ / total;
    this.progressFill.clear().fillStyle(0x22c55e, 1).fillRoundedRect(12, 34, (this.W - 24) * pct, 10, 6);
    this.questionText.setText(q.text);
    if (this.isLikertQuestion(q)) {
      this.helperText.setText('Thang đo: 1 = Hoàn toàn không đồng ý • 5 = Hoàn toàn đồng ý').setVisible(true);
    } else if (q.id === 'Q25') {
      this.helperText.setText('Chọn khoảng điểm phù hợp nhất với đánh giá của bạn').setVisible(true);
    } else {
      this.helperText.setVisible(false);
    }
  }
  isLikertQuestion(q) {
    return ['Q12','Q13','Q14','Q15','Q16','Q17','Q18','Q19','Q20','Q21','Q22','Q23'].includes(q.id);
  }
  normalizeOptionLabel(label) {
    const shortMap = { 'Dưới 18 tuổi': 'Dưới 18', 'Trên 35 tuổi': 'Trên 35', 'Dưới 5 triệu': 'Dưới 5tr', '5 - 10 triệu': '5-10tr', '11 - 20 triệu': '11-20tr', 'Trên 20 triệu': 'Trên 20tr', 'Tỉnh thành khác': 'Tỉnh khác', 'Không quan tâm': 'Không', 'Có quan tâm': 'Có', '500k - 1 triệu': '500k - 1tr', 'Trên 1 triệu': 'Trên 1tr', '4 - 6: Trung bình': '4 - 6: TB' };
    return shortMap[label] || label;
  }
  spawnPlatforms(qIndex) {
    this.platformViews.forEach(p => p.container.destroy()); this.platformViews = []; this.platforms = [];
    const q = SURVEY_DATA.questions[qIndex]; const opts = q.options; const n = opts.length;
    const step = (this.W - 48) / n; const startX = 24 + step / 2; const rowBaseY = this.H - CFG.GROUND_H - 145;
    opts.forEach((opt, i) => {
      const sx = startX + i * step; const sy = rowBaseY + ((i % 2 === 0) ? 0 : -18);
      const cont = this.add.container(sx, sy);
      const g = this.add.graphics(); g.fillStyle(opt.color, 1).fillRoundedRect(-CFG.PLATFORM_W / 2, -CFG.PLATFORM_H / 2, CFG.PLATFORM_W, CFG.PLATFORM_H, 8).fillStyle(0xffffff, 0.16).fillRoundedRect(-CFG.PLATFORM_W / 2 + 4, -CFG.PLATFORM_H / 2 + 3, CFG.PLATFORM_W - 8, 4, 3);
      const displayLabel = this.normalizeOptionLabel(opt.label);
      const labelBg = this.add.graphics(); labelBg.fillStyle(0x0f172a, 0.8).fillRoundedRect(-52, -52, 104, 28, 8);
      const label = this.add.text(0, -38, displayLabel, { fontFamily: 'Nunito, Arial, sans-serif', fontSize: displayLabel.length > 12 ? '10px' : '12px', fontStyle: '800', color: '#ffffff', align: 'center', wordWrap: { width: 96, useAdvancedWrap: true } }).setOrigin(0.5);
      cont.add([g, labelBg, label]);
      this.tweens.add({ targets: cont, y: sy - 5, duration: 980 + i * 80, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
      this.pfContainer.add(cont);
      this.platforms.push({ x: sx, y: sy, option: opt, optIndex: i }); this.platformViews.push({ container: cont });
    });
  }
  drawCharacter() {
    const g = this.charGfx; const x = this.charX; const y = this.charY; const f = this.facingRight ? 1 : -1;
    g.clear().fillStyle(0x000000, 0.18).fillEllipse(x, y + CFG.CHAR_H/2 + 3, CFG.CHAR_W + 8, 8).fillStyle(0x2563eb).fillRoundedRect(x - CFG.CHAR_W/2, y - CFG.CHAR_H/2 + 12, CFG.CHAR_W, CFG.CHAR_H - 12, 6).fillStyle(0xf1c27d).fillCircle(x, y - CFG.CHAR_H/2 + 8, 13).fillStyle(0xffffff).fillCircle(x + f * 4, y - CFG.CHAR_H/2 + 7, 4).fillStyle(0x111827).fillCircle(x + f * 5.4, y - CFG.CHAR_H/2 + 7, 2).fillStyle(0x22c55e).fillRoundedRect(x - 14 * f, y - CFG.CHAR_H/2 - 4, 24 * f, 8, 4).fillRect(x - 17 * f, y - CFG.CHAR_H/2 + 4, 28 * f, 4).fillStyle(0x1e3a8a).fillRoundedRect(x - 10, y + CFG.CHAR_H/2 - 12, 8, 12, 3).fillRoundedRect(x + 2, y + CFG.CHAR_H/2 - 12, 8, 12, 3);
  }
  drawGround() { this.groundGfx.clear().fillStyle(0x15803d, 1).fillRect(0, this.H - CFG.GROUND_H, this.W, CFG.GROUND_H).fillStyle(0x4ade80, 1).fillRect(0, this.H - CFG.GROUND_H, this.W, 7); }
  burst(x, y, color = 0xffffff) {
    for (let i = 0; i < 10; i++) {
      const dot = this.add.circle(x, y, Phaser.Math.Between(2, 4), color, 0.95); const a = Phaser.Math.FloatBetween(0, Math.PI * 2); const s = Phaser.Math.FloatBetween(80, 190);
      this.particles.push({ obj: dot, x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 80, life: 0.55, maxLife: 0.55 });
    }
  }
  saveAnswer(option) {
    const q = SURVEY_DATA.questions[this.currentQ];
    surveyResponses.push({ questionId: q.id, questionText: q.text, answerId: option.value, answerLabel: option.label, timestamp: new Date().toISOString() });
  }
  selectAnswer(option, idx) {
    if (this.transitioning) return;
    const q = SURVEY_DATA.questions[this.currentQ]; this.saveAnswer(option);
    const selectedView = this.platformViews[idx];
    if (selectedView) { this.tweens.add({ targets: selectedView.container, scaleX: 1.18, scaleY: 1.18, duration: 120, yoyo: true }); }
    this.burst(this.charX, this.charY, option.color); this.transitioning = true; this.answerLocked = true;
    if (q.id === 'Q05' && option.value === 'chua_dung') { this.time.delayedCall(520, () => this.endGame(true)); return; }
    this.time.delayedCall(540, () => {
      this.currentQ++; this.transitioning = false; this.answerLocked = false; this.charVX = 0; this.charVY = 0; this.charY = this.groundY; this.charX = this.W / 2;
      if (this.currentQ >= SURVEY_DATA.questions.length) { this.endGame(false); } else { this.spawnPlatforms(this.currentQ); this.updateQuestionUI(); }
    });
  }
  tryLandOnPlatform() {
    if (this.answerLocked || this.transitioning) return;
    for (let i = 0; i < this.platforms.length; i++) {
      const pf = this.platforms[i]; const py = this.platformViews[i].container.y;
      const charBottom = this.charY + CFG.CHAR_H / 2; const charLeft = this.charX - CFG.CHAR_W / 2 + 3; const charRight = this.charX + CFG.CHAR_W / 2 - 3;
      const pfTop = py - CFG.PLATFORM_H / 2; const pfLeft = pf.x - CFG.PLATFORM_W / 2; const pfRight = pf.x + CFG.PLATFORM_W / 2;
      if (charRight > pfLeft && charLeft < pfRight && charBottom >= pfTop - 2 && charBottom <= pfTop + 18 && this.charVY >= 0) {
        this.charY = pfTop - CFG.CHAR_H / 2; this.charVY = 0; this.selectAnswer(pf.option, i); break;
      }
    }
  }

  endGame(skipped = false) {
    const resultEl = document.getElementById('survey-result');
    const jsonEl = document.getElementById('result-json');
    const statusEl = document.getElementById('status-message');

    const output = {
      survey: SURVEY_DATA.title,
      completedAt: new Date().toISOString(),
      endedEarly: skipped,
      totalQuestions: SURVEY_DATA.questions.length,
      answeredQuestions: surveyResponses.length,
      responses: surveyResponses
    };

    jsonEl.textContent = JSON.stringify(output, null, 2);
    resultEl.style.display = 'block';

    // ĐƯỜNG LINK WEB APP CỦA THẦY ĐÃ ĐƯỢC CHÈN VÀO ĐÂY
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwpPRNLJ2KZq3lUvtRL7B8FZhiJeTsiwaylcP6Ex8U3OvgjECRqFhLtxG1ouTjQPmbPZA/exec';

    if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== '') {
      statusEl.textContent = "⏳ Đang gửi dữ liệu về máy chủ Google Sheets...";
      statusEl.className = "status-box status-warning";

      fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(output)
      })
      .then(() => {
        statusEl.textContent = "✅ Đồng bộ thành công! Dữ liệu đã nhảy vào file Google Sheets.";
        statusEl.className = "status-box status-success";
      })
      .catch(err => {
        statusEl.textContent = "❌ Lỗi kết nối: Không thể gửi tự động. Hãy sao chép thủ công!";
        statusEl.className = "status-box status-warning";
        console.error(err);
      });
    } else {
      statusEl.textContent = "⚠️ Chưa cấu hình URL. Dữ liệu lưu cục bộ.";
      statusEl.className = "status-box status-warning";
    }

    this.scene.pause();
  }

  update(time, delta) {
    if (this.transitioning) { this.drawCharacter(); this.drawGround(); this.updateParticles(delta); return; }
    const dt = delta / 1000;
    const moveLeft = this.leftDown || (this.cursors.left && this.cursors.left.isDown) || (this.keyA && this.keyA.isDown);
    const moveRight = this.rightDown || (this.cursors.right && this.cursors.right.isDown) || (this.keyD && this.keyD.isDown);
    if (Phaser.Input.Keyboard.JustDown(this.keySpace) || Phaser.Input.Keyboard.JustDown(this.keyW) || Phaser.Input.Keyboard.JustDown(this.keyUp)) this.jumpQueued = true;
    if (moveLeft && !moveRight) { this.charVX = -CFG.MOVE_SPEED; this.facingRight = false; }
    else if (moveRight && !moveLeft) { this.charVX = CFG.MOVE_SPEED; this.facingRight = true; }
    else { this.charVX *= (this.isOnGround() ? CFG.GROUND_DRAG : CFG.AIR_DRAG); }
    if (this.jumpQueued && this.canJump && this.isOnGround()) { this.charVY = CFG.JUMP_VEL; this.canJump = false; this.jumpQueued = false; }
    if (!this.jumpQueued && this.isOnGround()) this.canJump = true;
    if (this.charY < this.groundY - 2) this.canJump = false;
    this.charX += this.charVX * dt; this.charX = Phaser.Math.Wrap(this.charX, -10, this.W + 10);
    this.charVY += CFG.GRAVITY * dt; this.charY += this.charVY * dt;
    if (this.charY >= this.groundY) { this.charY = this.groundY; this.charVY = 0; this.canJump = true; }
    this.tryLandOnPlatform(); this.updateParticles(delta); this.drawCharacter(); this.drawGround();
  }
  isOnGround() { return this.charY >= this.groundY - 1 && this.charVY >= 0; }
  updateParticles(delta) {
    const dt = delta / 1000;
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i]; p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 220 * dt;
      p.obj.setPosition(p.x, p.y).setAlpha(Math.max(0, p.life / p.maxLife));
      if (p.life <= 0) { p.obj.destroy(); this.particles.splice(i, 1); }
    }
  }
}

function restartGame() {
  document.getElementById('survey-result').style.display = 'none';
  if (game) { game.scene.stop('GameScene'); game.scene.start('StartScene'); }
}

function copyResult() {
  const text = document.getElementById('result-json').textContent;
  navigator.clipboard.writeText(text).then(() => { alert('Đã sao chép kết quả khảo sát.'); })
  .catch(() => { alert('Không thể sao chép tự động. Vui lòng sao chép thủ công.'); });
}

function downloadJSON() {
  const text = document.getElementById('result-json').textContent;
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'survey_result.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function downloadCSV() {
  try {
    const data = JSON.parse(document.getElementById('result-json').textContent);
    let csv = '\ufeffCâu hỏi ID,Nội dung câu hỏi,Mã đáp án,Tên đáp án,Thời gian\n';
    data.responses.forEach(r => {
      const txt = r.questionText.replace(/"/g, '""');
      const lbl = r.answerLabel.replace(/"/g, '""');
      csv += `"${r.questionId}","${txt}","${r.answerId}","${lbl}","${r.timestamp}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'survey_result.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } catch(e) { alert('Không thể xuất file CSV'); }
}

const GAME_W = Math.min(window.innerWidth, 430);
const GAME_H = Math.min(window.innerHeight, 820);
game = new Phaser.Game({
  type: Phaser.AUTO, width: GAME_W, height: GAME_H, parent: 'game-container', backgroundColor: '#0f172a',
  scene: [StartScene, GameScene], scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
});
</script>
